name: lynq-ml CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lynq-ml:
    name: "lynq-ml: Test & Coverage"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Code Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: lynq-ml
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage "genbadge[coverage]"

      - name: Run tests with coverage
        working-directory: lynq-ml
        run: |
          coverage run -m unittest discover -s tests -t .
          coverage report -m
          coverage xml -o coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-ml
          path: lynq-ml/coverage.xml

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        working-directory: lynq-ml
        run: genbadge coverage -i coverage.xml -o ../.github/badges/coverage-ml.svg

      - name: Commit badge back to main
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update lynq-ml coverage badge [skip ci]"
          file_pattern: .github/badges/coverage-ml.svg
