name: lynq CICD

on:
  release:
    types: [published]

env:
  DOCKER_NAMESPACE: matlock0o/lynq
  # Version derived from the release tag, e.g. tag "v1.2.3" -> "1.2.3".
  VERSION: ${{ github.event.release.tag_name }}

jobs:
  set-version:
    name: Set release version from tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Code Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Java Environment
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          architecture: x64
          cache: maven

      - name: Resolve version from tag
        id: resolve
        run: |
          # Strip an optional leading "v" so poms carry a clean semver value.
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION"

      - name: Bump lynq-iam pom version
        working-directory: lynq-iam
        run: mvn -B versions:set -DnewVersion="${{ steps.resolve.outputs.version }}" -DgenerateBackupPoms=false

      - name: Bump lynq-app-backend pom version
        working-directory: lynq-app-backend
        run: mvn -B versions:set -DnewVersion="${{ steps.resolve.outputs.version }}" -DgenerateBackupPoms=false

      - name: Bump lynq-ml (python) version
        run: echo "${{ steps.resolve.outputs.version }}" > lynq-ml/VERSION

      - name: Generate version badge
        run: |
          mkdir -p .github/badges
          curl -sSL --fail \
            "https://img.shields.io/badge/version-${{ steps.resolve.outputs.version }}-blue" \
            -o .github/badges/version.svg

      - name: Commit version bump back to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: set release version ${{ steps.resolve.outputs.version }} [skip ci]"
          file_pattern: lynq-iam/pom.xml lynq-app-backend/pom.xml lynq-ml/VERSION .github/badges/version.svg

  build-lynq-iam:
    name: "lynq-iam: build, test & push image"
    runs-on: ubuntu-latest
    needs: set-version
    steps:
      - name: Code Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Java Environment
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          architecture: x64
          cache: maven

      - name: Build and run tests
        working-directory: lynq-iam
        run: mvn -B clean verify

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: lynq-iam
          file: lynq-iam/Dockerfile
          push: true
          tags: ${{ env.DOCKER_NAMESPACE }}:lynq-iam-${{ needs.set-version.outputs.version }}

  build-lynq-app-backend:
    name: "lynq-app-backend: build, test & push image"
    runs-on: ubuntu-latest
    needs: set-version
    steps:
      - name: Code Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Java Environment
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          architecture: x64
          cache: maven

      - name: Build and run tests
        working-directory: lynq-app-backend
        run: mvn -B clean verify

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: lynq-app-backend
          file: lynq-app-backend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_NAMESPACE }}:lynq-app-backend-${{ needs.set-version.outputs.version }}

  build-lynq-ml:
    name: "lynq-ml: build, test & push image"
    runs-on: ubuntu-latest
    needs: set-version
    steps:
      - name: Code Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: lynq-ml
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run tests
        working-directory: lynq-ml
        run: |
          coverage run -m unittest discover -s tests -t .
          coverage report -m

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: lynq-ml
          file: lynq-ml/Dockerfile
          push: true
          tags: ${{ env.DOCKER_NAMESPACE }}:lynq-ml-${{ needs.set-version.outputs.version }}

  # ---------------------------------------------------------------------------
  # Coverage reporting into the release notes (unchanged from before).
  # ---------------------------------------------------------------------------
  publish-coverage:
    name: Publish coverage to release notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Code Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java Environment
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          architecture: x64
          cache: maven

      - name: Run tests with coverage
        working-directory: lynq-iam
        run: mvn -B clean verify

      - name: Extract coverage percentages
        id: coverage
        working-directory: lynq-iam
        run: |
          CSV=target/site/jacoco/jacoco.csv
          read INSTR LINE BRANCH <<<"$(awk -F',' '
            NR>1 {
              im+=$4; ic+=$5;
              bm+=$6; bc+=$7;
              lm+=$8; lc+=$9;
            }
            END {
              printf "%.2f %.2f %.2f",
                (ic/(im+ic))*100,
                (lc/(lm+lc))*100,
                (bm+bc>0 ? (bc/(bm+bc))*100 : 0);
            }' "$CSV")"
          echo "instruction=$INSTR" >> "$GITHUB_OUTPUT"
          echo "line=$LINE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Append coverage summary to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          INSTR: ${{ steps.coverage.outputs.instruction }}
          LINE: ${{ steps.coverage.outputs.line }}
          BRANCH: ${{ steps.coverage.outputs.branch }}
        run: |
          existing=$(gh release view "$TAG" --json body -q .body)
          {
            printf '%s\n\n' "$existing"
            printf '---\n\n'
            printf '## Test coverage (lynq-iam)\n\n'
            printf '| Metric | Coverage |\n'
            printf '| --- | --- |\n'
            printf '| Instructions | %s%% |\n' "$INSTR"
            printf '| Lines | %s%% |\n' "$LINE"
            printf '| Branches | %s%% |\n' "$BRANCH"
          } > /tmp/notes.md
          gh release edit "$TAG" --notes-file /tmp/notes.md

      - name: Attach JaCoCo HTML report to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        working-directory: lynq-iam
        run: |
          (cd target/site && zip -qr /tmp/jacoco-report.zip jacoco)
          gh release upload "$TAG" /tmp/jacoco-report.zip --clobber

  publish-coverage-app-backend:
    name: Publish coverage to release notes (lynq-app-backend)
    runs-on: ubuntu-latest
    needs: publish-coverage
    permissions:
      contents: write
    steps:
      - name: Code Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java Environment
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          architecture: x64
          cache: maven

      - name: Run tests with coverage
        working-directory: lynq-app-backend
        run: mvn -B clean verify

      - name: Extract coverage percentages
        id: coverage
        working-directory: lynq-app-backend
        run: |
          CSV=target/site/jacoco/jacoco.csv
          read INSTR LINE BRANCH <<<"$(awk -F',' '
            NR>1 {
              im+=$4; ic+=$5;
              bm+=$6; bc+=$7;
              lm+=$8; lc+=$9;
            }
            END {
              printf "%.2f %.2f %.2f",
                (ic/(im+ic))*100,
                (lc/(lm+lc))*100,
                (bm+bc>0 ? (bc/(bm+bc))*100 : 0);
            }' "$CSV")"
          echo "instruction=$INSTR" >> "$GITHUB_OUTPUT"
          echo "line=$LINE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Append coverage summary to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          INSTR: ${{ steps.coverage.outputs.instruction }}
          LINE: ${{ steps.coverage.outputs.line }}
          BRANCH: ${{ steps.coverage.outputs.branch }}
        run: |
          existing=$(gh release view "$TAG" --json body -q .body)
          {
            printf '%s\n\n' "$existing"
            printf '---\n\n'
            printf '## Test coverage (lynq-app-backend)\n\n'
            printf '| Metric | Coverage |\n'
            printf '| --- | --- |\n'
            printf '| Instructions | %s%% |\n' "$INSTR"
            printf '| Lines | %s%% |\n' "$LINE"
            printf '| Branches | %s%% |\n' "$BRANCH"
          } > /tmp/notes-app-backend.md
          gh release edit "$TAG" --notes-file /tmp/notes-app-backend.md

      - name: Attach JaCoCo HTML report to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        working-directory: lynq-app-backend
        run: |
          (cd target/site && zip -qr /tmp/jacoco-report-app-backend.zip jacoco)
          gh release upload "$TAG" /tmp/jacoco-report-app-backend.zip --clobber
