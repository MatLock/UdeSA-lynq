apiVersion: v1
kind: Service
metadata:
  name: lynq-app-backend-service
  namespace: lynq-{{ .Values.k8s_namespace }}-namespace
  labels:
    app: lynq-app-backend
spec:
  type: ClusterIP
  selector:
    app: lynq-app-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: management
      port: 8081
      targetPort: management
