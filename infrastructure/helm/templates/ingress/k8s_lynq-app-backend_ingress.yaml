apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lynq-app-backend-ingress
  namespace: lynq-{{ .Values.k8s_namespace }}-namespace
  labels:
    app: lynq-app-backend
  annotations:
    # Merge into the single shared ALB.
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName }}
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn | quote }}
    # Actuator lives on the management port (8081).
    alb.ingress.kubernetes.io/healthcheck-port: '8081'
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health/readiness
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.lynq_app_backend.path }}
            pathType: Prefix
            backend:
              service:
                name: lynq-app-backend-service
                port:
                  name: http
