apiVersion: apps/v1
kind: Deployment
metadata:
  name: lynq-iam-deployment
  namespace: lynq-{{ .Values.k8s_namespace }}-namespace
  labels:
    app: lynq-iam
spec:
  replicas: {{ .Values.lynq_iam.replicas }}
  selector:
    matchLabels:
      app: lynq-iam
  template:
    metadata:
      labels:
        app: lynq-iam
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      {{- if .Values.localInfra }}
      # Local only: wait for the in-cluster dependencies before starting.
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -w 2 mysql 3306 </dev/null; do echo "waiting for mysql:3306"; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -w 2 redis 6379 </dev/null; do echo "waiting for redis:6379"; sleep 2; done']
      {{- end }}
      containers:
        - name: lynq-iam
          image: {{ .Values.lynq_iam.image }}
          envFrom:
            - configMapRef:
                name: lynq-iam-config
            - secretRef:
                name: lynq-iam-secret
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
