{{- if .Values.manageSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-secret
  namespace: lynq-{{ .Values.k8s_namespace }}-namespace
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"email\":\"%s\",\"auth\":\"%s\"}}}" .Values.docker.server .Values.docker.username .Values.docker.token .Values.docker.email (printf "%s:%s" .Values.docker.username .Values.docker.token | b64enc) | b64enc }}
{{- end }}
