services:
  lynq-iam:
    build: ./lynq-iam
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - DB_URL=jdbc:mysql://mysql:3306/lynq_iam_db
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-testpassword123}
      - REDIS_ADDRESS=redis
      - REDIS_PORT=6379
      - REDIS_USERNAME=${REDIS_USERNAME:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRATION_MINUTES=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      - JWT_REFRESH_TOKEN_EXPIRATION_DAYS=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-30}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  lynq-app-backend:
    build: ./lynq-app-backend
    ports:
      - "8082:8080"
      - "8083:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - DB_URL=jdbc:mysql://mysql:3306/lynq_backend_db
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-testpassword123}
      - LYNQ_IAM_URL=http://lynq-iam:8080/lynq-iam
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME:-lynq-bucket}
      - AWS_ENDPOINT=${AWS_ENDPOINT:-http://localstack:4566}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      lynq-iam:
        condition: service_started
      localstack:
        condition: service_healthy

  lynq-app-frontend:
    build:
      context: ./lynq-app-frontend
      args:
        # Vite bakes these at build time; the browser runs on the host, so they
        # point at the host-exposed ports of the IAM and backend services.
        - LYNQ_IAM_BASE_URL=${LYNQ_IAM_BASE_URL:-http://localhost:8080/lynq-iam}
        - LYNQ_BACKEND_BASE_URL=${LYNQ_BACKEND_BASE_URL:-http://localhost:8082/lynq-backend-app}
    ports:
      - "3000:80"
    depends_on:
      - lynq-iam
      - lynq-app-backend

  # Local LLM used by lynq-ml (skill enhancement). Serves llama3.1 over Ollama's
  # HTTP API on 11434. lynq-ml defaults to LLM_PROVIDER=ollama with
  # OLLAMA_BASE_URL=http://localhost:11434 and OLLAMA_MODEL=llama3.1, so running
  # it on the host talks to this container through the exposed port with no extra
  # config — the docker llama is the default.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: pulls the default model (llama3.1) into the shared volume, then
  # exits. Override the model with OLLAMA_MODEL to match lynq-ml's env var.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
    entrypoint: ["/bin/sh", "-c", "ollama pull \"$${OLLAMA_MODEL}\""]
    restart: "no"

  # FastAPI skill-enhancement service. Defaults to the docker llama (ollama),
  # reachable on the compose network at http://ollama:11434 — so OLLAMA_BASE_URL
  # overrides lynq-ml's localhost default. Waits for the model to finish pulling
  # before starting.
  lynq-ml:
    build: ./lynq-ml
    ports:
      - "8084:8084"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - PORT=8084
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8084/lynq-ml/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:9.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-testpassword123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: gresau/localstack-persist:4.5
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME:-lynq-bucket}
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d:ro
      - localstack_data:/persisted-data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"\\(running\\|available\\)\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command:
      - "redis-server"
      - "--user"
      - "default"
      - "off"
      - "--user"
      - "${REDIS_USERNAME:-root}"
      - "on"
      - ">${REDIS_PASSWORD:-password}"
      - "~*"
      - "&*"
      - "+@all"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "${REDIS_USERNAME:-root}", "-a", "${REDIS_PASSWORD:-password}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  localstack_data:
  ollama_data:
